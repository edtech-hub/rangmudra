<div class="auth-modal-backdrop" id="auth-modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="auth-modal-heading">
  <div class="auth-modal" id="auth-modal">

    <!-- Screen A: Phone Entry -->
    <div id="auth-screen-a">
      <button class="auth-modal__close" id="auth-close-a" aria-label="Close">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>

      <span class="auth-modal__wordmark">RANGMUDRA</span>

      <h2 class="auth-modal__heading" id="auth-modal-heading">Welcome</h2>
      <p class="auth-modal__subtext">Enter your phone number to continue</p>

      <div class="auth-modal__phone-row">
        <button class="auth-modal__country-selector" id="country-selector" aria-label="Select country code" aria-haspopup="listbox" aria-expanded="false">
          <span id="selected-flag">🇮🇳</span>
          <span class="auth-modal__country-code" id="selected-code">+91</span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
          <!-- Country dropdown will be injected here by country-codes.js -->
        </button>
        <input
          type="tel"
          class="auth-modal__phone-input"
          id="phone-input"
          placeholder="Phone number"
          maxlength="15"
          inputmode="numeric"
          autocomplete="tel"
          aria-label="Phone number"
        >
      </div>
      <div class="input-error" id="phone-error" style="display:none;" aria-live="polite"></div>

      <button class="auth-modal__continue-btn" id="continue-btn" disabled>CONTINUE</button>

      <p class="auth-modal__terms">
        By continuing, you agree to our
        <a href="terms.html">Terms of Service</a> and
        <a href="privacy.html">Privacy Policy</a>
      </p>

      <div class="auth-modal__whatsapp-row">
        <input type="checkbox" class="auth-modal__checkbox" id="whatsapp-opt" aria-label="Send order updates via WhatsApp">
        <label for="whatsapp-opt" class="h6-a" style="color: var(--sc-l3);">Send order updates via WhatsApp</label>
      </div>
    </div>

    <!-- Screen B: OTP Verify -->
    <div id="auth-screen-b" style="display:none;">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;">
        <button class="auth-modal__back-link" id="auth-back-btn" aria-label="Back to phone entry">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
          Back
        </button>
        <button class="auth-modal__close" id="auth-close-b" aria-label="Close">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <h2 class="auth-modal__heading" id="otp-heading">Verify OTP</h2>
      <p class="auth-modal__subtext" id="otp-subtext">We've sent a 6-digit code to your number</p>

      <div class="otp-grid" id="otp-grid" role="group" aria-label="OTP verification code">
        <input class="otp-box" type="tel" maxlength="1" pattern="[0-9]" inputmode="numeric" autocomplete="one-time-code" aria-label="Digit 1">
        <input class="otp-box" type="tel" maxlength="1" pattern="[0-9]" inputmode="numeric" aria-label="Digit 2">
        <input class="otp-box" type="tel" maxlength="1" pattern="[0-9]" inputmode="numeric" aria-label="Digit 3">
        <input class="otp-box" type="tel" maxlength="1" pattern="[0-9]" inputmode="numeric" aria-label="Digit 4">
        <input class="otp-box" type="tel" maxlength="1" pattern="[0-9]" inputmode="numeric" aria-label="Digit 5">
        <input class="otp-box" type="tel" maxlength="1" pattern="[0-9]" inputmode="numeric" aria-label="Digit 6">
      </div>
      <div class="input-error" id="otp-error" style="display:none;" aria-live="polite"></div>

      <button class="auth-modal__continue-btn" id="verify-btn" disabled>VERIFY</button>

      <p class="auth-modal__terms" style="margin-top:24px;" id="resend-row">
        Didn't receive the code?
        <span id="resend-timer" style="color:var(--sc-l4x);">Resend in <span id="resend-countdown">30</span>s</span>
        <button id="resend-btn" style="display:none; color:var(--pr-b2); text-decoration:underline; background:none; border:none; cursor:pointer; font-family:var(--font-archivo); font-size:12px; letter-spacing:0.15em;" aria-label="Resend OTP">Resend OTP</button>
      </p>
    </div>

  </div>
</div>
