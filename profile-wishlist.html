<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wishlist — Rangmudra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Italiana&family=Archivo:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/pages.css">
</head>
<body style="background:var(--pr-l5);">
  <div data-partial="header"></div>

  <div class="breadcrumb-wrap"><nav data-breadcrumb></nav></div>
  <main style="padding-top:calc(88px + 48px);padding-bottom:80px;">
    <div class="container">
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:48px;">
        <a href="profile.html" class="btn-ghost">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
          Profile
        </a>
        <h1 class="h3-i color-sc-100">Wishlist</h1>
      </div>
      <div class="shop-grid" id="wishlist-grid" aria-label="Wishlist items"></div>
    </div>
  </main>
  <div data-partial="footer"></div>
  <div data-partial="auth-modal"></div>
  <script type="module" src="/js/components.js"></script>
  <script type="module">
    import { isLoggedIn, openAuthModal } from '/js/auth.js';
    import { getWishlist, removeFromWishlist } from '/js/wishlist.js';
    document.addEventListener('DOMContentLoaded', () => {
      if (!isLoggedIn()) { openAuthModal(() => location.reload()); return; }
      const grid = document.getElementById('wishlist-grid');
      const items = getWishlist();
      if (!items.length) {
        grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:80px 0;"><p class="h4-i color-sc-l3">Your wishlist is empty</p><a href="shop.html" class="btn-primary" style="margin-top:24px;display:inline-flex;">Browse Collection</a></div>`;
        return;
      }
      grid.innerHTML = items.map(p => `
        <a href="product.html?slug=${p.id}" class="shop-card">
          <div class="shop-card__img-wrap">
            <img src="${p.image || '/images/uploads/prod-ajrakh-corset-1.jpg'}" alt="${p.name}" class="shop-card__image" loading="lazy" width="400" height="500">
            <button class="shop-card__wishlist active" data-id="${p.id}" aria-label="Remove from wishlist">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
            </button>
          </div>
          <div class="shop-card__info">
            <p class="shop-card__name">${p.name}</p>
            <p class="shop-card__price">₹${p.price?.toLocaleString('en-IN') || ''}</p>
          </div>
        </a>
      `).join('');
      grid.querySelectorAll('.shop-card__wishlist').forEach(btn => {
        btn.addEventListener('click', (e) => { e.preventDefault(); removeFromWishlist(btn.dataset.id); location.reload(); });
      });
    });
  </script>
</body>
</html>
