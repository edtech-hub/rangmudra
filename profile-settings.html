<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings — Rangmudra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Italiana&family=Archivo:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/pages.css">
</head>
<body>
  <div data-partial="header"></div>

  <div class="breadcrumb-wrap"><nav data-breadcrumb></nav></div>
  <main class="profile-page">
    <div class="container" style="max-width:600px;">
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:40px;">
        <a href="profile.html" class="btn-ghost">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
          Profile
        </a>
        <h1 class="h3-i color-sc-100">Settings</h1>
      </div>
      <div style="background:var(--w1);border-radius:16px;padding:32px;box-shadow:var(--shadow-card);display:flex;flex-direction:column;gap:24px;">
        <div class="input-wrap">
          <label class="input-label" for="s-name">Full Name</label>
          <input type="text" id="s-name" class="input-field" placeholder="Riya Sharma" value="Riya Sharma">
        </div>
        <div class="input-wrap">
          <label class="input-label" for="s-email">Email Address</label>
          <input type="email" id="s-email" class="input-field" placeholder="hello@you.com">
        </div>
        <div class="auth-modal__whatsapp-row" style="justify-content:flex-start;gap:12px;">
          <input type="checkbox" class="auth-modal__checkbox" id="s-whatsapp" checked aria-label="Receive order updates on WhatsApp">
          <label for="s-whatsapp" class="h6-a" style="color:var(--sc-l3);letter-spacing:0.15em;">Receive order updates on WhatsApp</label>
        </div>
        <div class="auth-modal__whatsapp-row" style="justify-content:flex-start;gap:12px;">
          <input type="checkbox" class="auth-modal__checkbox" id="s-newsletter" aria-label="Subscribe to newsletter">
          <label for="s-newsletter" class="h6-a" style="color:var(--sc-l3);letter-spacing:0.15em;">Subscribe to newsletter</label>
        </div>
        <button class="btn-gold" id="save-btn">SAVE SETTINGS</button>
      </div>
    </div>
  </main>
  <div data-partial="footer"></div>
  <div data-partial="auth-modal"></div>
  <script type="module" src="/js/components.js"></script>
  <script type="module">
    import { isLoggedIn, openAuthModal } from '/js/auth.js';
    document.addEventListener('DOMContentLoaded', () => {
      if (!isLoggedIn()) { openAuthModal(() => location.reload()); return; }
      document.getElementById('save-btn')?.addEventListener('click', () => {
        const btn = document.getElementById('save-btn');
        btn.textContent = '✓ Saved!';
        btn.style.background = 'var(--ac-100)';
        setTimeout(() => { btn.textContent = 'SAVE SETTINGS'; btn.style.background = ''; }, 2000);
      });
    });
  </script>
</body>
</html>
